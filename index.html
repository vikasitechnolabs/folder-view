<!DOCTYPE html>
<html>
<head>
  <title>Photo Selector</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: #111;
      color: white;
    }

    img {
      max-width: 80%;
      max-height: 500px;
      margin-top: 20px;
      border-radius: 10px;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    .delete {
      background: red;
      color: white;
    }

    .next {
      background: green;
      color: white;
    }
    .viewer {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 20px;
}

.main {
  max-width: 65%;
  max-height: 900px;
  border-radius: 10px;
}

.side {
  width: 300px;
  height: 200px;
  object-fit: cover;
  opacity: 0.5;
  border-radius: 8px;
}
  </style>
</head>
<body>

<h2>📸 Photo Selector</h2>

<button onclick="loadFolder()">Select Folder</button>

<h3 id="counter"></h3>

<!-- <img id="preview" />

<br> -->
<div class="viewer">
    <img id="prevPreview" class="side" onclick="prevImage()" />
     <img id="preview" class="main" />
    <img id="nextPreview" class="side" onclick="nextImage()" />


</div>

<br>

<button class="next" onclick="prevImage()">⬅️ Previous</button>
<button class="next" onclick="nextImage()">Next →</button>
<button class="delete" onclick="deleteAndNext()">❌ Delete + Next</button>

<script src="renderer.js"></script>

</body>
</html>
